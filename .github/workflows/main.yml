name: CI/CD for Medical Processing Service
# Test Pipeline
on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  id-token: write
  contents: read

jobs:
  ci-checks:
    name: Run CI Checks (Lint, Build, Test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
  build-and-deploy:
    name: Build Docker Image and Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ECR_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set Image Tag Environment Variables
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "IMAGE_TAG=$SHORT_SHA-$TIMESTAMP" >> $GITHUB_ENV

      - name: Build and Push Docker Image to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AWS_ECR_REGISTRY }}/${{ secrets.AWS_ECR_REPOSITORY }}:latest
            ${{ secrets.AWS_ECR_REGISTRY }}/${{ secrets.AWS_ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy to EC2 via SSM Run Command
        id: ssm_deploy
        run: |
          COMMANDS='[
            "set -e",
            "cd /home/ubuntu/medical-processing-service",
            "echo --- Fetching environment variables from AWS Secrets Manager ---",
            "aws secretsmanager get-secret-value --secret-id ${{ secrets.AWS_SECRET_ARN }} --region ${{ secrets.AWS_REGION }} --query SecretString --output text | jq -r \"to_entries[] | \\\"\\(.key)=\\(.value)\\\"\"> .env",
            "echo --- Environment variables configured ---",
            "export DOCKER_IMAGE=${{ secrets.AWS_ECR_REGISTRY }}/${{ secrets.AWS_ECR_REPOSITORY }}:${{env.IMAGE_TAG}}",
            "export IMAGE_TAG=${{env.IMAGE_TAG}}",
            "echo --- Logging into ECR ---",
            "echo --- Pulling latest image: $DOCKER_IMAGE ---",
            "docker compose pull",
            "docker compose up -d --force-recreate --remove-orphans",
            "echo --- Services restarted with new image ---",
            "docker image prune -f",
            "echo --- Deployment complete ---"
          ]'

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying commit ${{ github.sha }}" \
            --parameters "commands=$COMMANDS" \
            --query 'Command.CommandId' \
            --output text)

          if [ -z "$COMMAND_ID" ]; then
            echo "Failed to send SSM command."
            echo "deploy_msg=❌ SSM Command initiation failed." >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "SSM Command sent. ID: $COMMAND_ID. Waiting for completion..."

          timeout_seconds=300
          interval_seconds=10
          elapsed_seconds=0

          while [ $elapsed_seconds -lt $timeout_seconds ]; do
            STATUS_INFO=$(aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query "{Status:Status,StatusDetails:StatusDetails}" --output json)
            STATUS=$(echo "$STATUS_INFO" | jq -r .Status)

            echo "Current command status: $STATUS"

            if [[ "$STATUS" == "Success" ]]; then
              echo "✅ SSM Deployment Successful!"
              echo "deploy_msg=✅ SSM Deployment Successful (ID: $COMMAND_ID)" >> $GITHUB_OUTPUT
              echo "--- SSM Command Output ---"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text
              exit 0
            elif [[ "$STATUS" == "Failed" || "$STATUS" == "Cancelled" || "$STATUS" == "DeliveryTimedOut" || "$STATUS" == "ExecutionTimedOut" ]]; then
              echo "❌ SSM Deployment Failed! Status: $STATUS"
              echo "deploy_msg=❌ SSM Deployment Failed (ID: $COMMAND_ID, Status: $STATUS, Details: $STATUS_DETAILS)" >> $GITHUB_OUTPUT
              echo "--- SSM Standard Output ---"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query "StandardOutputContent" --output text
              echo "--- SSM Standard Error ---"
              aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep $interval_seconds
            elapsed_seconds=$((elapsed_seconds + interval_seconds))
          done

          echo "⌛ SSM Command Timed Out after $timeout_seconds seconds."
          echo "deploy_msg=⌛ SSM Command Timed Out waiting for completion after $timeout_seconds seconds (ID: $COMMAND_ID)" >> $GITHUB_OUTPUT
          exit 1

      - name: Notify Discord
        if: always()
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          username: Mediboard Node LLM Server Pipeline Bot (Production)
          message: |
            📦 **Server Deployment Summary**

            🔀 Branch: `${{ github.ref_name }}`
            📄 Commit: `${{ github.sha }}` by `${{ github.actor }}`
            🚀 **Deployment:** ${{ steps.ssm_deploy.outputs.deploy_msg }}
            🌐 **App Url:** https://api-nodellm.mediboard.ai/api/docs

            🔗 [View Run on GitHub](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
